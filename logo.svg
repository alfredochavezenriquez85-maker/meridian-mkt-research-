<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 580" fill="none">
  <defs>
    <linearGradient id="g1" x1="250" y1="30" x2="390" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2D7B"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g2" x1="250" y1="30" x2="80" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2D7B"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="g3" x1="80" y1="230" x2="250" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD000"/>
    </linearGradient>
    <linearGradient id="g4" x1="390" y1="260" x2="250" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD000"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="g5" x1="390" y1="260" x2="440" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD000"/>
      <stop offset="100%" stop-color="#00CED1"/>
    </linearGradient>
    <linearGradient id="g6" x1="250" y1="430" x2="120" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#FF2D7B"/>
      <stop offset="100%" stop-color="#9B30FF"/>
    </linearGradient>
    <radialGradient id="rPink" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FF8CB0"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </radialGradient>
    <radialGradient id="rOrangeL" cx="40%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </radialGradient>
    <radialGradient id="rGold" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFE040"/>
      <stop offset="100%" stop-color="#FFB000"/>
    </radialGradient>
    <radialGradient id="rOrangeB" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#FF7B00"/>
    </radialGradient>
    <radialGradient id="rCyan" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#60FFFF"/>
      <stop offset="100%" stop-color="#00CED1"/>
    </radialGradient>
    <radialGradient id="rPurple" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#D070FF"/>
      <stop offset="100%" stop-color="#8B00CC"/>
    </radialGradient>
  </defs>

  <!-- Lines connecting nodes -->
  <line x1="250" y1="42" x2="390" y2="260" stroke="url(#g1)" stroke-width="22" stroke-linecap="round"/>
  <line x1="250" y1="42" x2="80" y2="230" stroke="url(#g2)" stroke-width="22" stroke-linecap="round"/>
  <line x1="80" y1="230" x2="250" y2="430" stroke="url(#g3)" stroke-width="22" stroke-linecap="round"/>
  <line x1="390" y1="260" x2="250" y2="430" stroke="url(#g4)" stroke-width="22" stroke-linecap="round"/>
  <line x1="390" y1="260" x2="440" y2="390" stroke="url(#g5)" stroke-width="18" stroke-linecap="round"/>
  <line x1="250" y1="430" x2="120" y2="540" stroke="url(#g6)" stroke-width="18" stroke-linecap="round"/>

  <!-- Main nodes -->
  <circle cx="250" cy="42" r="38" fill="url(#rPink)"/>
  <circle cx="80" cy="230" r="42" fill="url(#rOrangeL)"/>
  <circle cx="390" cy="260" r="34" fill="url(#rGold)"/>
  <circle cx="250" cy="430" r="32" fill="url(#rOrangeB)"/>
  <circle cx="440" cy="390" r="38" fill="url(#rCyan)"/>
  <circle cx="120" cy="540" r="32" fill="url(#rPurple)"/>

  <!-- Small accent dots -->
  <circle cx="68" cy="108" r="14" fill="#FF00BF"/>
  <circle cx="430" cy="150" r="12" fill="#7B00B0"/>
  <circle cx="42" cy="390" r="14" fill="#00D4FF"/>
  <circle cx="380" cy="500" r="11" fill="#2B00CC"/>
</svg>
